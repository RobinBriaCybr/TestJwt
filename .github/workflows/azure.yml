run-name: Test CyberArk Integration
# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch test
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tabs
  workflow_dispatch:

 
jobs:
  cyberark-integration:
    permissions:
      id-token: 'write'
      contents: 'read'
    runs-on: ubuntu-latest
 
    steps:


      - name: Import Secrets using CyberArk Conjur Secret Fetcher
        uses: cyberark/conjur-action@v2.0.6
        with:
          url: https://emeadevops.secretsmgr.cyberark.cloud/api
          account: conjur
          authn_id: rba-public-github
          secrets: data/vault/rba-github/Operating System-UnixSSH-1.1.1.1-root/password|password
      
      - name: echo secrets
        run: |
          TENANT_ID="032734d4-b0fe-4736-92df-d923b68c0316"
          CLIENT_ID="662fcea2-8510-4bd8-82ee-fad16ab09451"
          CLIENT_SECRET="RW98Q~rUMuqibr0OTYMo3vlCilK3DmUPK2Df9ahk"
          SUBSCRIPTION_ID="8b044dd6-a22d-4bc9-9541-88dcf78d3f4a"
          RESOURCE_GROUP="rba-ressource-groupe"
          
          # --- 2. Get Access Token ---
          echo "Authenticating..."
          
          TOKEN_RESPONSE=$(curl -s -X POST "https://login.microsoftonline.com/$TENANT_ID/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=$CLIENT_ID" \
            --data-urlencode "client_secret=$CLIENT_SECRET" \
            --data-urlencode "scope=https://management.azure.com/.default")
          
          ACCESS_TOKEN=$(echo $TOKEN_RESPONSE | jq -r '.access_token')
          
          if [ "$ACCESS_TOKEN" == "null" ] || [ -z "$ACCESS_TOKEN" ]; then
              echo "Error: Failed to obtain access token."
              echo $TOKEN_RESPONSE | jq .
              exit 1
          fi
          
          echo "Token obtained successfully."
          
          # --- 3. Make the REST API Call ---
          # Example: Get Resource Group details
          API_URL="https://management.azure.com/subscriptions/$SUBSCRIPTION_ID/resourcegroups/$RESOURCE_GROUP?api-version=2021-04-01"
          
          echo "Fetching object details..."
          
          RESPONSE=$(curl -s -X GET "$API_URL" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json")
          
          # --- 4. Output Result ---
          echo "--------------------------------------"
          echo "Azure Response:"
          echo "$RESPONSE" | jq .
          echo "--------------------------------------"
